    function getGrade(pct) {
      if (pct >= 90) return { label: "Excelente", color: "#22c55e", emoji: "🚀" };

    // Typing test
    function TypingTest({ onComplete }) {
      const [started, setStarted] = useState(false);
      const [input, setInput] = useState("");
      const [startTime, setStartTime] = useState(null);
      const [result, setResult] = useState(null);
      const inputRef = useRef(null);

      const handleStart = () => {
        setStarted(true);
        setStartTime(Date.now());
        setTimeout(() => inputRef.current?.focus(), 100);
      };

      const handleChange = (e) => {
        const val = e.target.value;
        setInput(val);
        if (val.length >= TYPING_TEXT.length) {
          finishTest(val);
        }
      };

      const finishTest = (val) => {
        const elapsed = (Date.now() - startTime) / 1000 / 60;
        const words = val.trim().split(/\s+/).length;
        const wpm = Math.round(words / elapsed);
        let correctChars = 0;
        for (let i = 0; i < Math.min(val.length, TYPING_TEXT.length); i++) {
          if (val[i] === TYPING_TEXT[i]) correctChars++;
        }
        const accuracy = Math.round(
          (correctChars / Math.max(val.length, TYPING_TEXT.length)) * 100
        );
        const score = Math.min(
          100,
          Math.round((Math.min(wpm, 60) / 60) * 50 + (accuracy / 100) * 50)
        );
        const r = { wpm, accuracy, score };
        setResult(r);
        onComplete(r.score);
      };

      const getCharColor = (i) => {
        if (i >= input.length) return "#6b7280";
        return input[i] === TYPING_TEXT[i] ? "#22c55e" : "#ef4444";
      };

      if (result) {
        const g = getGrade(result.score);
        return (
          <div style={{ textAlign: "center", padding: "2rem" }}>
            <div style={{ fontSize: "3rem", marginBottom: "0.5rem" }}>{g.emoji}</div>
            <div style={{ fontSize: "1.5rem", fontWeight: 700, color: g.color, marginBottom: "1rem" }}>{g.label}</div>
            <div style={{ display: "flex", justifyContent: "center", gap: "2rem", marginBottom: "1rem" }}>
              <div>
                <div style={{ fontSize: "2rem", fontWeight: 700, color: "#e2e8f0" }}>{result.wpm}</div>
                <div style={{ fontSize: "0.8rem", color: "#94a3b8" }}>palavras/min</div>
              </div>
              <div>
                <div style={{ fontSize: "2rem", fontWeight: 700, color: "#e2e8f0" }}>{result.accuracy}%</div>
                <div style={{ fontSize: "0.8rem", color: "#94a3b8" }}>precisão</div>
              </div>

            </div>

        );

      if (!started) {

            <p style={{ color: "#cbd5e1", marginBottom: "0.5rem", fontSize: "0.95rem" }}>

            </p>
            <p style={{ color: "#64748b", marginBottom: "1.5rem", fontSize: "0.8rem" }}>
              Não vale copiar e colar! 😉
            </p>
            <button
              onClick={handleStart}
              style={{
                padding: "0.75rem 2.5rem",
                background: "linear-gradient(135deg, #6366f1, #8b5cf6)",
                color: "#fff",
                border: "none",
                borderRadius: 12,
                fontSize: "1.1rem",
                fontWeight: 600,
                cursor: "pointer",
                transition: "transform 0.15s",
              }}
              onMouseOver={(e) => (e.target.style.transform = "scale(1.05)")}
              onMouseOut={(e) => (e.target.style.transform = "scale(1)")}
            >
              Começar Teste de Digitação
            </button>
          </div>
        );
      }

      return (
        <div style={{ padding: "1rem" }}>
          <div
            style={{
              background: "#0f172a",
              borderRadius: 12,
              padding: "1.25rem",
              marginBottom: "1rem",
              lineHeight: 1.8,
              fontSize: "1rem",
              fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
              letterSpacing: "0.02em",
              border: "1px solid #1e293b",
            }}
          >
            {TYPING_TEXT.split("").map((char, i) => (
              <span
                key={i}
                style={{
                  color: getCharColor(i),
                  backgroundColor: i === input.length ? "rgba(99,102,241,0.35)" : "transparent",
                  borderRadius: 2,
                  transition: "color 0.1s",
                }}
              >
                {char}
              </span>
            ))}
          </div>
          <textarea
            ref={inputRef}
            value={input}
            onChange={handleChange}
            onPaste={(e) => e.preventDefault()}
            placeholder="Comece a digitar aqui..."
            style={{

          {input.length > 0 && (

              onClick={() => finishTest(input)}

    }

    // Quiz
    function QuizSection({ sectionId, questions, onComplete }) {
      const [current, setCurrent] = useState(0);
      const [selected, setSelected] = useState(null);
      const [showResult, setShowResult] = useState(false);
      const [correctCount, setCorrectCount] = useState(0);
      const [answered, setAnswered] = useState(false);
      const [answers, setAnswers] = useState([]);

      const handleSelect = (idx) => {
        if (answered) return;
        setSelected(idx);
        setAnswered(true);
        const isCorrect = idx === questions[current].correct;
        if (isCorrect) setCorrectCount((c) => c + 1);

        const newAnswer = {
          pergunta: questions[current].q,
          resposta_escolhida: questions[current].options[idx],
          resposta_correta: questions[current].options[questions[current].correct],
          acertou: isCorrect,
        };
        const updatedAnswers = [...answers, newAnswer];
        setAnswers(updatedAnswers);

        setShowResult(true);
        setTimeout(() => {
          if (current < questions.length - 1) {
            setCurrent((c) => c + 1);
            setSelected(null);
            setShowResult(false);
            setAnswered(false);
          } else {
            const finalCorrect = correctCount + (isCorrect ? 1 : 0);
            const score = Math.round((finalCorrect / questions.length) * 100);
            onComplete(score, updatedAnswers);
          }
        }, 1200);
      };

      const q = questions[current];

      return (
        <div style={{ padding: "1rem" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1rem" }}>
            <span style={{ color: "#94a3b8", fontSize: "0.8rem" }}>
              Pergunta {current + 1} de {questions.length}
            </span>
            <div style={{ display: "flex", gap: 4 }}>
              {questions.map((_, i) => (
                <div
                  key={i}
                  style={{
                    width: 8,
                    height: 8,
                    borderRadius: "50%",
                    background: i < current ? "#6366f1" : i === current ? "#a5b4fc" : "#334155",
                    transition: "background 0.3s",
                  }}
                />
              ))}
            </div>
          </div>

          <p style={{ color: "#e2e8f0", fontSize: "1.05rem", fontWeight: 500, marginBottom: "1.25rem", lineHeight: 1.5 }}>
            {q.q}
          </p>

          <div style={{ display: "flex", flexDirection: "column", gap: "0.6rem" }}>
            {q.options.map((opt, i) => {
              let bg = "#1e293b";
              let border = "1px solid #334155";
              let color = "#cbd5e1";
              if (showResult) {
                if (i === q.correct) {
                  bg = "rgba(34,197,94,0.15)";
                  border = "1px solid #22c55e";
                  color = "#22c55e";
                } else if (i === selected && i !== q.correct) {
                  bg = "rgba(239,68,68,0.15)";
                  border = "1px solid #ef4444";
                  color = "#ef4444";
                }
              } else if (i === selected) {
                bg = "rgba(99,102,241,0.2)";
                border = "1px solid #6366f1";
              }
              return (
                <button
                  key={i}
                  onClick={() => handleSelect(i)}
                  style={{
                    display: "flex",
                    alignItems: "center",
                    gap: "0.75rem",
                    padding: "0.85rem 1rem",
                    background: bg,
                    border,
                    borderRadius: 10,
                    color,
                    fontSize: "0.95rem",
                    cursor: answered ? "default" : "pointer",
                    textAlign: "left",
                    transition: "all 0.2s",
                    opacity: showResult && i !== q.correct && i !== selected ? 0.4 : 1,
                  }}
                  onMouseOver={(e) => {
                    if (!answered) e.currentTarget.style.background = "rgba(99,102,241,0.12)";
                  }}
                  onMouseOut={(e) => {
                    if (!answered && i !== selected) e.currentTarget.style.background = "#1e293b";
                  }}
                >
                  <span
                    style={{
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      width: 28,
                      height: 28,
                      borderRadius: "50%",
                      background: showResult && i === q.correct ? "#22c55e" : "rgba(99,102,241,0.2)",
                      color: showResult && i === q.correct ? "#fff" : "#a5b4fc",
                      fontSize: "0.75rem",
                      fontWeight: 700,
                      flexShrink: 0,
                    }}
                  >
                    {String.fromCharCode(65 + i)}
                  </span>
                  {opt}
                </button>
              );
            })}
          </div>
        </div>
      );
    }

      const allScores = sectionData.reduce((acc, s) => {
        acc[s.id] = s.score ?? 0;

      const verdict = getOverallVerdict(allScores);
      const avgScore = Math.round(Object.values(allScores).reduce((a, b) => a + b, 0) / Object.values(allScores).length);

      return (
        <div style={{ padding: "1.5rem" }}>

              textAlign: "center",
              padding: "2rem",
              background: `linear-gradient(135deg, ${verdict.color}15, ${verdict.color}08)`,
              borderRadius: 16,
              border: `1px solid ${verdict.color}40`,
              marginBottom: "2rem",
            }}
          >
            <div style={{ fontSize: "3.5rem", fontWeight: 800, color: verdict.color, marginBottom: "0.25rem" }}>
              {avgScore}<span style={{ fontSize: "1.5rem" }}>/100</span>
            </div>
            <div style={{ fontSize: "1.4rem", fontWeight: 700, color: "#e2e8f0", marginBottom: "0.5rem" }}>
              {verdict.title}
            </div>
            <p style={{ color: "#94a3b8", fontSize: "0.95rem", maxWidth: 500, margin: "0 auto", lineHeight: 1.6 }}>
              {verdict.msg}
            </p>
          </div>

          <h3 style={{ color: "#e2e8f0", fontSize: "1.1rem", fontWeight: 600, marginBottom: "1rem" }}>
            Detalhamento por Área
          </h3>

          <div style={{ display: "flex", flexDirection: "column", gap: "0.75rem" }}>
            {sectionData.map((s) => {
              const g = getGrade(s.score ?? 0);
              const showTip = (s.score ?? 0) < 70;
              return (
                <div
                  key={s.id}
                  style={{
                    background: "#1e293b",
                    borderRadius: 12,
                    padding: "1rem 1.25rem",
                    border: "1px solid #334155",
                  }}
                >
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: showTip ? "0.6rem" : 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: "0.6rem" }}>
                      <span style={{ fontSize: "1.2rem" }}>{s.icon}</span>
                      <span style={{ color: "#e2e8f0", fontWeight: 500 }}>{s.label}</span>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: "0.75rem" }}>
                      <div style={{ width: 120, height: 8, background: "#0f172a", borderRadius: 4, overflow: "hidden" }}>
                        <div
                          style={{
                            width: `${s.score ?? 0}%`,
                            height: "100%",
                            background: g.color,
                            borderRadius: 4,
                            transition: "width 1s ease",
                          }}
                        />
                      </div>
                      <span style={{ color: g.color, fontWeight: 700, fontSize: "0.9rem", minWidth: 35, textAlign: "right" }}>
                        {s.score ?? 0}%
                      </span>
                    </div>
                  </div>
                  {showTip && (
                    <p style={{ color: "#94a3b8", fontSize: "0.8rem", margin: 0, paddingLeft: "2rem", lineHeight: 1.5 }}>
                      💡 {s.tip}
                    </p>
                  )}
                </div>
              );
            })}
          </div>

          {/* Status de salvamento e mensagem final */}
          <div style={{
            textAlign: "center", marginTop: "2rem", padding: "2rem",
            background: "linear-gradient(135deg, rgba(34,197,94,0.1), rgba(34,197,94,0.05))",
            borderRadius: 16, border: "1px solid rgba(34,197,94,0.2)",
          }}>
            {saving && (
              <div>
                <div style={{ fontSize: "2rem", marginBottom: "0.5rem" }}>⏳</div>
                <span style={{ color: "#94a3b8", fontSize: "0.95rem" }}>Salvando resultado...</span>
              </div>
            )}
            {saved && (
              <div>
                <div style={{ fontSize: "2.5rem", marginBottom: "0.75rem" }}>🎉</div>
                <h3 style={{ color: "#22c55e", fontSize: "1.3rem", fontWeight: 700, marginBottom: "0.5rem" }}>
                  Teste Concluido!
                </h3>
                <p style={{ color: "#cbd5e1", fontSize: "0.95rem", lineHeight: 1.7 }}>
                  Obrigado, <strong style={{ color: "#e2e8f0" }}>{candidato.nome}</strong>! Seus resultados das 2 partes foram registrados com sucesso.
                </p>
                <p style={{ color: "#94a3b8", fontSize: "0.85rem", marginTop: "0.75rem", lineHeight: 1.6 }}>
                  Estamos analisando seus resultados e entraremos em contato pelo email <strong style={{ color: "#a5b4fc" }}>{candidato.email}</strong>.
                </p>
              </div>
            )}
          </div>
        </div>
      );
    }

    // Main App
    function App() {
      // Ler nome/email dos query params da URL (vem do teste-digitacao.html)
      const urlParams = new URLSearchParams(window.location.search);
      const candidato = { nome: urlParams.get("nome") || "", email: urlParams.get("email") || "" };

      const [phase, setPhase] = useState("intro");
      const [scores, setScores] = useState({});
      const [typingScore, setTypingScore] = useState(0);
      const [sectionIndex, setSectionIndex] = useState(-1);
      const [saving, setSaving] = useState(false);
      const [saved, setSaved] = useState(false);
      const [allAnswers, setAllAnswers] = useState({});

      const sectionOrder = ["typing", "shortcuts", "browser", "files", "logic", "search"];

      const startTest = () => {
        setPhase("typing");
        setSectionIndex(0);
      };

      const handleSectionComplete = (score, sectionAnswers) => {
        const current = sectionOrder[sectionIndex];
        let newScores = scores;
        let newTypingScore = typingScore;
        let newAllAnswers = allAnswers;
        if (current === "typing") {
          newTypingScore = score;
          setTypingScore(score);
        } else {
          newScores = { ...scores, [current]: score };
          setScores(newScores);
        }
        if (sectionAnswers) {
          newAllAnswers = { ...allAnswers, [current]: sectionAnswers };
          setAllAnswers(newAllAnswers);
        }
        setTimeout(() => {
          const next = sectionIndex + 1;
          if (next < sectionOrder.length) {
            setSectionIndex(next);
            setPhase(sectionOrder[next]);
          } else {
            setPhase("results");
            // Salvar no Supabase
            const allScores = { typing: newTypingScore, ...newScores };
            const avg = Math.round(Object.values(allScores).reduce((a, b) => a + b, 0) / Object.values(allScores).length);
            const verdict = getOverallVerdict(allScores);
            setSaving(true);
            supabase.from("resultados_fluencia").insert({
              nome: candidato.nome,
              email: candidato.email,
              score_geral: avg,
              score_digitacao: newTypingScore,
              score_atalhos: newScores.shortcuts || 0,
              score_navegador: newScores.browser || 0,
              score_arquivos: newScores.files || 0,
              score_logica: newScores.logic || 0,
              score_pesquisa: newScores.search || 0,
              nivel: getGrade(avg).label,
              veredicto: verdict.title,
              respostas_detalhadas: newAllAnswers,
            }).then(({ error }) => {
              setSaving(false);
              if (!error) setSaved(true);
              else console.error("Erro ao salvar:", error);
            });
          }
        }, 800);
      };

      const restart = () => {
        setPhase("intro");
        setScores({});
        setTypingScore(0);
        setSectionIndex(-1);
        setSaved(false);
      };

      const currentSection = sectionOrder[sectionIndex];
      const currentSectionMeta = SECTIONS.find((s) => s.id === currentSection);
      const progress = sectionIndex >= 0 ? ((sectionIndex) / sectionOrder.length) * 100 : 0;

      return (
        <div
          style={{
            minHeight: "100vh",
            background: "#0f172a",
            fontFamily: "'Outfit', 'Satoshi', system-ui, sans-serif",
            color: "#e2e8f0",
          }}
        >
          {/* Header */}
          <div
            style={{
              padding: "1.25rem 1.5rem",
              borderBottom: "1px solid #1e293b",
              display: "flex",
              alignItems: "center",
              justifyContent: "space-between",
            }}
          >
            <div style={{ display: "flex", alignItems: "center", gap: "0.6rem" }}>
              <span style={{ fontSize: "1.4rem" }}>🖥️</span>
              <span style={{ fontWeight: 700, fontSize: "1.1rem", letterSpacing: "-0.02em" }}>
                Teste de Fluência Digital
              </span>
            </div>
            {sectionIndex >= 0 && phase !== "results" && (
              <div style={{ display: "flex", alignItems: "center", gap: "0.5rem" }}>
                {sectionOrder.map((s, i) => {
                  const meta = SECTIONS.find((sec) => sec.id === s);
                  const done = i < sectionIndex;
                  const active = i === sectionIndex;
                  return (
                    <div
                      key={s}
                      title={meta.label}
                      style={{
                        width: 32,
                        height: 32,
                        borderRadius: "50%",
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                        fontSize: "0.9rem",
                        background: done ? "#6366f1" : active ? "#334155" : "#1e293b",
                        border: active ? "2px solid #6366f1" : "1px solid #334155",
                        opacity: done ? 1 : active ? 1 : 0.4,
                        transition: "all 0.3s",
                      }}
                    >
                      {done ? "✓" : meta.icon}
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* Progress bar */}
          {sectionIndex >= 0 && phase !== "results" && (
            <div style={{ height: 3, background: "#1e293b" }}>
              <div
                style={{
                  height: "100%",
                  width: `${progress}%`,
                  background: "linear-gradient(90deg, #6366f1, #8b5cf6)",
                  transition: "width 0.5s ease",
                }}
              />
            </div>
          )}

          {/* Content */}
          <div style={{ maxWidth: 640, margin: "0 auto", padding: "0 1rem" }}>
            {phase === "intro" && (
              <div style={{ textAlign: "center", paddingTop: "4rem" }}>
                <div
                  style={{
                    fontSize: "4rem",
                    marginBottom: "1rem",
                    filter: "drop-shadow(0 0 30px rgba(99,102,241,0.3))",
                  }}
                >
                  🖥️
                </div>
                <h1
                  style={{
                    fontSize: "2rem",
                    fontWeight: 800,
                    letterSpacing: "-0.03em",
                    marginBottom: "0.5rem",
                    background: "linear-gradient(135deg, #e2e8f0, #94a3b8)",
                    WebkitBackgroundClip: "text",
                    WebkitTextFillColor: "transparent",
                  }}
                >
                  Teste de Fluência Digital
                </h1>
                <p style={{ color: "#64748b", fontSize: "1.05rem", marginBottom: "2.5rem", lineHeight: 1.6, maxWidth: 460, margin: "0 auto 2.5rem" }}>
                  Antes de começar a vibecodar, vamos ver como anda sua fluência com o computador. São 6 seções rápidas — leva uns 10 minutos.
                </p>

                <div
                  style={{
                    display: "grid",
                    gridTemplateColumns: "repeat(3, 1fr)",
                    gap: "0.75rem",
                    marginBottom: "2.5rem",
                    maxWidth: 420,
                    margin: "0 auto 2.5rem",
                  }}
                >
                  {SECTIONS.map((s) => (
                    <div
                      key={s.id}
                      style={{
                        background: "#1e293b",
                        borderRadius: 12,
                        padding: "1rem 0.5rem",
                        border: "1px solid #334155",
                        textAlign: "center",
                      }}
                    >
                      <div style={{ fontSize: "1.5rem", marginBottom: "0.3rem" }}>{s.icon}</div>
                      <div style={{ fontSize: "0.75rem", color: "#94a3b8", fontWeight: 500 }}>{s.label}</div>
                    </div>
                  ))}
                </div>

                <button
                  onClick={startTest}
                  style={{
                    padding: "0.9rem 3rem",
                    background: "linear-gradient(135deg, #6366f1, #8b5cf6)",
                    color: "#fff",
                    border: "none",
                    borderRadius: 14,
                    fontSize: "1.15rem",
                    fontWeight: 700,
                    cursor: "pointer",
                    boxShadow: "0 4px 24px rgba(99,102,241,0.3)",
                    transition: "transform 0.15s, box-shadow 0.15s",
                  }}
                  onMouseOver={(e) => {
                    e.target.style.transform = "scale(1.05)";
                    e.target.style.boxShadow = "0 6px 32px rgba(99,102,241,0.5)";
                  }}
                  onMouseOut={(e) => {
                    e.target.style.transform = "scale(1)";
                    e.target.style.boxShadow = "0 4px 24px rgba(99,102,241,0.3)";
                  }}
                >
                  Começar Teste →
                </button>
              </div>
            )}

            {phase !== "intro" && phase !== "results" && (
              <div style={{ paddingTop: "1.5rem" }}>
                {currentSectionMeta && (
                  <div style={{ marginBottom: "0.75rem", display: "flex", alignItems: "center", gap: "0.5rem" }}>
                    <span style={{ fontSize: "1.3rem" }}>{currentSectionMeta.icon}</span>
                    <h2 style={{ fontSize: "1.25rem", fontWeight: 700, margin: 0 }}>{currentSectionMeta.label}</h2>
                  </div>
                )}

                {phase === "typing" && <TypingTest onComplete={handleSectionComplete} />}
                {phase !== "typing" && ALL_QUESTIONS[phase] && (
                  <QuizSection
                    key={phase}
                    sectionId={phase}
                    questions={ALL_QUESTIONS[phase]}
                    onComplete={handleSectionComplete}
                  />
                )}
              </div>
            )}

            {phase === "results" && (
              <div style={{ paddingTop: "1.5rem" }}>
                <Results scores={scores} typingScore={typingScore} onRestart={restart} saving={saving} saved={saved} candidato={candidato} />
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
